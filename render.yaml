services:
  - type: web
    name: gwansang-yangban-mcp
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FACEVIBE_API_URL
        value: https://slotdle.gabia.io
